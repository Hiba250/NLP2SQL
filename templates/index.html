<!DOCTYPE html><html><head><title>NLP2SQL</title></head><body><h1>NLP to SQL</h1><textarea id='q'></textarea><button onclick='go()'>Generate</button><pre id='out'></pre><script>function go(){fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:document.getElementById('q').value})}).then(r=>r.json()).then(d=>{document.getElementById('out').textContent=d.sql})}</script></body></html>
