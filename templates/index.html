<!DOCTYPE html><html><head><title>NLP2SQL</title><style>body{background:#0f172a;color:#e2e8f0;font-family:sans-serif;padding:2rem;}button{background:#7c3aed;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;margin:.25rem;}pre{background:#1e293b;padding:1rem;border-radius:8px;}</style></head><body><h1>NLP to SQL</h1><div><button onclick='setQ(this)'>Show all employees</button><button onclick='setQ(this)'>Top 5 products by price</button><button onclick='setQ(this)'>Average salary by department</button></div><textarea id='q' style='width:100%;height:80px;margin-top:1rem;'></textarea><button onclick='go()'>Generate SQL</button><pre id='out'></pre><script>function setQ(b){document.getElementById('q').value=b.textContent}function go(){fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:document.getElementById('q').value})}).then(r=>r.json()).then(d=>{document.getElementById('out').textContent=d.sql||d.error})}</script></body></html>
